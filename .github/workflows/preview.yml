name: PR preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    name: Build & upload preview
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build docs
        run: npm run docs:build

      - name: Upload preview artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: docs-preview-pr${{ github.event.pull_request.number }}
          path: .vitepress/dist
          retention-days: 7

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const artifactUrl = `${runUrl}#artifacts`;
            const body = [
              '## 📖 文档预览',
              '',
              `构建成功！点击下方链接下载预览包，解压后用浏览器打开 \`index.html\` 查看效果。`,
              '',
              `**[⬇️ 下载预览包（保留 7 天）](${artifactUrl})**`,
              '',
              `> 产物名称：\`docs-preview-pr${{ github.event.pull_request.number }}\``,
              `> 构建运行：[#${context.runNumber}](${runUrl})`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(
              c => c.user.type === 'Bot' && c.body.includes('## 📖 文档预览')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
